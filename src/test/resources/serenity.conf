serenity {
  project.name = "SauceDemo Purchase Automation"
  take.screenshots = FOR_EACH_ACTION
  browser.maximized = true
}

webdriver {
  base.url = "https://www.saucedemo.com/"
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
  }
}

chrome {
  switches = "--remote-allow-origins=*;--start-maximized;--incognito;--disable-notifications;--disable-save-password-bubble;--disable-features=PasswordLeakDetection,PasswordCheck,AutofillServerCommunication,ChromeWhatsNewUI"
  capabilities {
    w3c = true
    "goog:chromeOptions".prefs = {
      credentials_enable_service = false
      "profile.password_manager_enabled" = false
      "profile.password_manager_leak_detection" = false
    }
  }
}
